<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Drilex Share</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a000e;
      background-image: radial-gradient(circle at top right, rgba(137, 46, 255, 0.05), transparent);
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .accent-glow {
      box-shadow: 0 0 15px rgba(137, 46, 255, 0.2);
    }
    input::placeholder { color: #6b7280; }
  </style>
</head>
<body class="text-gray-100 min-h-screen">

  <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0a000e]/95 backdrop-blur-md">
    <div class="glass p-8 rounded-2xl w-full max-w-md shadow-2xl border-white/10">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold bg-gradient-to-b from-white to-gray-400 bg-clip-text text-transparent">Admin Access</h2>
        <p class="text-gray-500 text-sm mt-2">Drilex Share Management Area</p>
      </div>
      <input id="login-password" type="password" placeholder="Password" 
             class="w-full mb-4 p-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:border-[#892eff] transition-all" />
      <button id="login-btn" 
              class="w-full py-3 bg-[#892eff] hover:bg-[#9666ff] rounded-xl font-bold transition-all accent-glow active:scale-95">
        Login to Dashboard
      </button>
    </div>
  </div>

  <div class="container mx-auto p-6 lg:p-12" id="dashboard" style="display:none;">
    
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
      <div>
        <h1 class="text-4xl font-extrabold tracking-tight">Admin Dashboard</h1>
        <p class="text-gray-400">Manage your files and secure storage</p>
      </div>
      <button id="logout-btn" class="px-5 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/20 rounded-xl transition-all font-semibold">
        Log out
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-1">
        <div class="glass p-6 rounded-2xl sticky top-8">
          <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            Upload New File
          </h2>
          <form id="upload-form" class="space-y-4">
            <div class="group relative">
                <input type="file" id="file-input" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#892eff] file:text-white hover:file:bg-[#9666ff] cursor-pointer" />
            </div>
            <input type="text" id="upload-nickname" placeholder="Nickname (required)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-[#892eff] transition-all" />
            <input type="password" id="upload-password" placeholder="Password (optional)" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-[#892eff] transition-all" />
            <button type="submit" class="w-full py-3 bg-[#892eff] hover:bg-[#9666ff] rounded-xl font-bold transition-all shadow-lg active:scale-95">
              Start Upload
            </button>
          </form>
        </div>
      </div>

      <div class="lg:col-span-2">
        <div class="glass rounded-2xl overflow-hidden">
          <div class="p-6 border-b border-white/5">
             <h2 class="text-xl font-bold">Stored Files</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full text-left border-collapse">
              <thead>
                <tr class="bg-white/5 text-gray-400 text-xs uppercase tracking-wider">
                  <th class="px-6 py-4">Filename</th>
                  <th class="px-6 py-4">Owner</th>
                  <th class="px-6 py-4 text-center">Status</th>
                  <th class="px-6 py-4">Date</th>
                  <th class="px-6 py-4 text-right">Action</th>
                </tr>
              </thead>
              <tbody id="files-body" class="divide-y divide-white/5">
                </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- VŠECHNA TVOJE PŮVODNÍ LOGIKA ZACHOVÁNA ---
    const overlay = document.getElementById('login-overlay');
    const dashboard = document.getElementById('dashboard');
    const loginBtn = document.getElementById('login-btn');
    const loginPass = document.getElementById('login-password');

    function showDashboard() {
      overlay.style.display = 'none';
      dashboard.style.display = 'block';
      loadFiles();
    }

    loginBtn.onclick = () => {
      const pw = loginPass.value;
      if (pw) {
        localStorage.setItem('adminPassword', pw);
        showDashboard();
      }
    };

    if (localStorage.getItem('adminPassword')) {
      showDashboard();
    }

    document.getElementById('logout-btn').onclick = () => {
      localStorage.removeItem('adminPassword');
      dashboard.style.display = 'none';
      overlay.style.display = 'flex';
    };

    document.getElementById('upload-form').onsubmit = async (e) => {
      e.preventDefault();
      const fileInput = document.getElementById('file-input');
      if (!fileInput.files.length) return;
      const form = new FormData();
      form.append('file', fileInput.files[0]);
      form.append('nickname', document.getElementById('upload-nickname').value);
      form.append('password', document.getElementById('upload-password').value);
      const res = await fetch('/api/upload', {
        method: 'POST',
        body: form,
        headers: { 'x-admin-password': localStorage.getItem('adminPassword') }
      });
      if (res.ok) {
        fileInput.value = '';
        document.getElementById('upload-nickname').value = '';
        document.getElementById('upload-password').value = '';
        loadFiles();
      } else {
        alert('upload failed');
      }
    };

    async function loadFiles() {
      const res = await fetch('/api/files');
      const data = await res.json();
      const body = document.getElementById('files-body');
      body.innerHTML = '';
      data.forEach(f => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-white/[0.02] transition-colors group";
        tr.innerHTML = `
          <td class="px-6 py-4 font-medium text-gray-200">${f.originalName}</td>
          <td class="px-6 py-4 text-gray-400 text-sm">${f.nickname}</td>
          <td class="px-6 py-4 text-center">
            <span class="px-2 py-1 rounded-md text-[10px] font-bold ${f.isLocked ? 'bg-orange-500/10 text-orange-500' : 'bg-green-500/10 text-green-500'}">
              ${f.isLocked ? 'LOCKED' : 'OPEN'}
            </span>
          </td>
          <td class="px-6 py-4 text-gray-500 text-xs">${new Date(f.uploadDate).toLocaleString()}</td>
          <td class="px-6 py-4 text-right">
            <button data-id="${f.id}" class="delete-btn px-3 py-1 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white rounded-lg text-xs transition-all opacity-0 group-hover:opacity-100">
              Delete
            </button>
          </td>
        `;
        body.appendChild(tr);
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.onclick = onDelete;
      });
    }

    async function onDelete(e) {
      if (!confirm('Are you sure?')) return;
      const id = e.target.dataset.id;
      const res = await fetch(`/api/files/${id}`, {
        method: 'DELETE',
        headers: { 'x-admin-password': localStorage.getItem('adminPassword') }
      });
      if (res.ok) loadFiles();
      else alert('delete failed');
    }
  </script>
</body>
</html>
