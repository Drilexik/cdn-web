<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CDN | Drilex</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a000e;
            --accent: #892eff;
            --text: #ffffff;
            --text-muted: #b8b0c8;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(137, 46, 255, 0.08) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .hero-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
        }

        .title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #ffffff, #b8b0c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 32px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(137, 46, 255, 0.1);
            border: 1px solid rgba(137, 46, 255, 0.2);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        footer {
            padding: 40px 24px;
            text-align: center;
        }

        .footer-links {
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        .footer-links a {
            color: var(--text);
            font-size: 24px;
            transition: all 0.3s ease;
            opacity: 0.6;
        }

        .footer-links a:hover {
            color: var(--accent);
            opacity: 1;
            transform: translateY(-3px);
        }

        .footer-copyright {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="hero-card">
            <div class="status-badge">
                <div class="status-dot"></div>
                SERVER RUNNING
            </div>
            <h1 class="title">DRILEX SHARE</h1>
            <p class="subtitle">
                Advanced Cloud Delivery Network. <br>
                Fast & Secure File Sharing <br>
                
            </p>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="https://drilex.cz/" target="_blank" rel="noopener" title="Main Website">
                <i class="fas fa-globe"></i>
            </a>
            <a href="https://drilex.cz/discord/" target="_blank" rel="noopener" title="Discord">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://github.com/Drilexik" target="_blank" rel="noopener" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>
        <div class="footer-copyright">© 2026 DRILEX DEVELOPMENT</div>
    </footer>
</body>
</html>
